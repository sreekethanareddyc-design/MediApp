<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediConnect Bangalore</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', 'Segoe UI', sans-serif; background: #F3F4F6; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const HOSPITALS = [
      { id: 1,  name: "Manipal Hospital", area: "Old Airport Road", distance: "3.2 km", rating: 4.8, reviews: 8420, wait: "~20 min", specialty: ["Cardiology","Neurology","Oncology","Orthopedics","General","Pediatrics","Pulmonology","Gastroenterology"], beds: 600, type: "Private", emergency: true, phone: "080-2502-4444" },
      { id: 2,  name: "Fortis Hospital", area: "Bannerghatta Road", distance: "5.1 km", rating: 4.7, reviews: 6231, wait: "~25 min", specialty: ["Cardiology","Neurology","Orthopedics","Dermatology","General","ENT","Gynecology"], beds: 400, type: "Private", emergency: true, phone: "080-6621-4444" },
      { id: 3,  name: "St. John's Medical College", area: "Koramangala", distance: "4.8 km", rating: 4.6, reviews: 5102, wait: "~30 min", specialty: ["General","Cardiology","Neurology","Pediatrics","Gynecology","Psychiatry","Gastroenterology"], beds: 1254, type: "Government-aided", emergency: true, phone: "080-2206-5000" },
      { id: 4,  name: "Narayana Health City", area: "Bommasandra", distance: "7.4 km", rating: 4.9, reviews: 9870, wait: "~15 min", specialty: ["Cardiology","Neurology","Oncology","Orthopedics","Pediatrics","Pulmonology"], beds: 3000, type: "Private", emergency: true, phone: "080-7122-2222" },
      { id: 5,  name: "Vikram Hospital", area: "Millers Road", distance: "2.6 km", rating: 4.5, reviews: 3245, wait: "~20 min", specialty: ["Orthopedics","General","ENT","Dermatology","Gastroenterology"], beds: 220, type: "Private", emergency: true, phone: "080-4014-4000" },
      { id: 6,  name: "Victoria Hospital (BMCRI)", area: "City Market", distance: "3.9 km", rating: 4.2, reviews: 4100, wait: "~45 min", specialty: ["General","Neurology","Pediatrics","Psychiatry","Orthopedics"], beds: 1300, type: "Government", emergency: true, phone: "080-2670-1150" },
      { id: 7,  name: "Cloudnine Hospital", area: "Jayanagar", distance: "6.3 km", rating: 4.8, reviews: 4521, wait: "~15 min", specialty: ["Gynecology","Pediatrics","General"], beds: 130, type: "Private", emergency: true, phone: "1800-208-4080" },
      { id: 8,  name: "Apollo Hospital", area: "Bannerghatta Road", distance: "5.8 km", rating: 4.7, reviews: 7234, wait: "~20 min", specialty: ["Cardiology","Neurology","Oncology","Orthopedics","General","Dermatology","ENT","Pulmonology"], beds: 350, type: "Private", emergency: true, phone: "080-2630-4050" },
      { id: 9,  name: "Sakra World Hospital", area: "Devarabeesanahalli", distance: "8.2 km", rating: 4.6, reviews: 3890, wait: "~25 min", specialty: ["Neurology","Orthopedics","Cardiology","General","Gastroenterology"], beds: 350, type: "Private", emergency: true, phone: "080-4969-4969" },
      { id: 10, name: "BGS Gleneagles Hospital", area: "Kengeri", distance: "9.5 km", rating: 4.5, reviews: 2876, wait: "~20 min", specialty: ["Cardiology","General","Orthopedics","Neurology","ENT","Pediatrics"], beds: 400, type: "Private", emergency: true, phone: "080-4645-6789" },
    ];

    const SPECIALTY_MAP = [
      { specialty: "Cardiology",       keywords: ["chest","heart","palpitation","cardiac","breathless","angina","heartbeat"] },
      { specialty: "Neurology",        keywords: ["headache","migraine","dizziness","vertigo","seizure","stroke","numbness","memory","fainting","tremor","balance"] },
      { specialty: "Dermatology",      keywords: ["rash","skin","acne","itch","lesion","eczema","psoriasis","hives","pigmentation"] },
      { specialty: "Orthopedics",      keywords: ["bone","joint","fracture","knee","back","shoulder","sprain","ankle","hip","arthritis","spine"] },
      { specialty: "Pediatrics",       keywords: ["child","baby","infant","kid","toddler","son","daughter","newborn"] },
      { specialty: "Gastroenterology", keywords: ["stomach","nausea","vomit","abdomen","digestion","bloating","diarrhea","constipation","acidity","ulcer"] },
      { specialty: "ENT",              keywords: ["ear","throat","nose","sinus","hearing","tonsil","nasal","hoarse"] },
      { specialty: "Pulmonology",      keywords: ["cough","breathing","lung","asthma","pneumonia","respiratory","wheezing"] },
      { specialty: "Gynecology",       keywords: ["period","menstrual","pregnancy","pregnant","uterus","ovary","pcos","fertility","breast"] },
      { specialty: "Psychiatry",       keywords: ["anxiety","depression","mental","sleep","insomnia","panic","stress","mood","bipolar"] },
      { specialty: "General",          keywords: ["fever","fatigue","weakness","checkup","tired","cold","flu","weight","appetite"] },
    ];

    const detectSpecialty = (ans) => {
      const text = Object.values(ans).join(" ").toLowerCase();
      for (const m of SPECIALTY_MAP) {
        if (m.keywords.some(k => text.includes(k))) return m.specialty;
      }
      return "General";
    };

    const getTriageLevel = (ans) => {
      const text = Object.values(ans).join(" ").toLowerCase();
      const sev = (ans.severity || "").toLowerCase();
      const dur = ans.duration || "";
      if (["chest pain","stroke","seizure","unconscious","severe bleeding","can't breathe","paralysis"].some(k => text.includes(k))) return "EMERGENCY";
      if (sev.includes("very severe") || dur === "More than 2 weeks" || sev.includes("severe")) return "URGENT";
      if (sev.includes("moderate") || dur === "4-14 days") return "MODERATE";
      return "MILD";
    };

    const TC = { EMERGENCY: "#EF4444", URGENT: "#F97316", MODERATE: "#EAB308", MILD: "#22C55E" };
    const TI = { EMERGENCY: "🚨", URGENT: "⚠️", MODERATE: "🔔", MILD: "✅" };
    const TB = { EMERGENCY: "#FEF2F2", URGENT: "#FFF7ED", MODERATE: "#FEFCE8", MILD: "#F0FDF4" };

    const QUESTIONS = [
      { id: "name", bot: "Hello! 👋 I'm **MediBot**, your personal health assistant in Bangalore.\n\nMay I know your **name** to get started?", type: "text", placeholder: "Your name...", key: "name" },
      { id: "age_gender", bot: (a) => `Nice to meet you, **${a.name}**! 😊\n\nWhat is your **age** and **gender**?`, type: "dual", key: "age" },
      { id: "main_symptom", bot: "What is the **main symptom** or health concern bothering you today?\n\n_Be as specific as you can — e.g. 'sharp chest pain', 'persistent dry cough', 'swollen knee'_", type: "text", placeholder: "Describe your main symptom...", key: "mainSymptom" },
      { id: "other_symptoms", bot: "Are you experiencing any **other symptoms** alongside this? _(Select all that apply)_", type: "multiselect", key: "otherSymptoms", options: ["Fever","Fatigue / Weakness","Nausea / Vomiting","Headache","Dizziness","Shortness of breath","Body aches","Loss of appetite","Swelling","Chills","None of the above"] },
      { id: "duration", bot: "How **long** have you been experiencing these symptoms?", type: "select", key: "duration", options: ["Just started today","2-3 days","4-14 days","More than 2 weeks","Months / Ongoing / Chronic"] },
      { id: "severity", bot: "How would you describe the **severity** of your discomfort right now?", type: "scale", key: "severity", options: ["Mild — manageable, minor discomfort","Moderate — affecting daily activities","Severe — hard to function normally","Very Severe — unbearable / emergency"] },
      { id: "onset", bot: "How did your symptoms **begin**?", type: "select", key: "onset", options: ["Suddenly / Out of nowhere","Gradually over a few days","After an injury or physical activity","After eating or drinking something","After travel or change in environment","I'm not sure"] },
      { id: "pattern", bot: "Do your symptoms follow any **pattern**?", type: "select", key: "pattern", options: ["Constant — present all the time","Intermittent — comes and goes","Worse in morning","Worse at night","Worsens with activity","Gets better with rest"] },
      { id: "history", bot: "Do you have any **existing medical conditions** or past diagnoses? _(Select all that apply)_", type: "multiselect", key: "history", options: ["Diabetes","Hypertension / High BP","Heart disease","Asthma / Lung condition","Thyroid disorder","Kidney / Liver disease","Cancer","Recent surgery","None of the above"] },
      { id: "medications", bot: "Are you currently on any **medications or supplements**?", type: "select", key: "medications", options: ["Yes — prescribed by a doctor","Yes — self-medicated / OTC","No medications currently","I'm not sure"] },
      { id: "allergies", bot: "Do you have any known **allergies**?", type: "select", key: "allergies", options: ["Yes — allergic to certain medicines","Yes — food allergies","Yes — environmental allergies","Multiple allergies","No known allergies"] },
      { id: "pregnant", bot: (a) => a.gender === "Female" ? "Are you currently **pregnant** or could you be?" : null, type: "select", key: "pregnant", options: ["Yes — confirmed pregnant","Possibly / Trying to conceive","No","Not applicable"], skipIf: (a) => a.gender !== "Female" },
      { id: "visited_doctor", bot: "Have you **seen a doctor** for this issue before?", type: "select", key: "visitedDoctor", options: ["Yes — seeking a second opinion","Yes — need a follow-up visit","No — first time for this issue","Had a teleconsult / online consult"] },
      { id: "preference", bot: "Almost done! Any **preference** for your hospital?", type: "select", key: "preference", options: ["Nearest to me","Highest rated / Best quality","Government / Affordable option","Private / Premium care","No preference"] },
    ];

    const TIMESLOTS = ["9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM"];

    function Stars({ r }) {
      return <span style={{ color: "#F59E0B", fontSize: "12px" }}>{"★".repeat(Math.floor(r))}{"☆".repeat(5-Math.floor(r))}<span style={{ color: "#9CA3AF", marginLeft: "4px" }}>{r}</span></span>;
    }

    function Bubble({ children, isUser }) {
      return (
        <div style={{
          maxWidth: isUser ? "80%" : "94%", alignSelf: isUser ? "flex-end" : "flex-start",
          background: isUser ? "linear-gradient(135deg,#4F46E5,#7C3AED)" : "#fff",
          color: isUser ? "#fff" : "#1F2937",
          borderRadius: isUser ? "18px 18px 4px 18px" : "4px 18px 18px 18px",
          padding: "12px 16px", boxShadow: isUser ? "0 4px 14px rgba(79,70,229,0.3)" : "0 2px 12px rgba(0,0,0,0.07)",
          fontSize: "14px", lineHeight: "1.65",
        }}>{children}</div>
      );
    }

    function fmt(t) { return (t||"").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>"); }

    function Dots() {
      return <div style={{ display:"flex", gap:"5px", padding:"14px 16px", background:"#fff", borderRadius:"4px 18px 18px 18px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", width:"fit-content" }}>
        {[0,1,2].map(i=><div key={i} style={{ width:"8px", height:"8px", borderRadius:"50%", background:"#C4B5FD", animation:`bob 1s ease ${i*0.18}s infinite` }}/>)}
      </div>;
    }

    function BotRow({ children }) {
      return (
        <div style={{ display:"flex", gap:"8px", alignItems:"flex-start", width:"100%" }}>
          <div style={{ width:"28px", height:"28px", borderRadius:"10px", background:"linear-gradient(135deg,#4F46E5,#10B981)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px", flexShrink:0, marginTop:"2px" }}>🤖</div>
          <div style={{ flex:1 }}>{children}</div>
        </div>
      );
    }

    function HospCard({ h, onSelect, selected }) {
      const tc = h.type==="Government"?"#10B981":h.type==="Government-aided"?"#3B82F6":"#8B5CF6";
      return (
        <div onClick={()=>onSelect(h)} style={{
          borderRadius:"14px", padding:"14px 16px", cursor:"pointer", marginBottom:"8px",
          border:`2px solid ${selected?"#4F46E5":"rgba(0,0,0,0.07)"}`,
          background: selected?"#EEF2FF":"#fff",
          boxShadow: selected?"0 4px 20px rgba(79,70,229,0.2)":"0 2px 10px rgba(0,0,0,0.05)",
          transition:"all 0.2s"
        }}>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontWeight:"800", fontSize:"14px", color:"#111827" }}>{h.name}</div>
              <div style={{ fontSize:"12px", color:"#6B7280", marginTop:"2px" }}>📍 {h.area}, Bangalore</div>
              <div style={{ marginTop:"4px" }}><Stars r={h.rating}/><span style={{ fontSize:"11px", color:"#9CA3AF", marginLeft:"4px" }}>({h.reviews.toLocaleString()} reviews)</span></div>
            </div>
            {selected && <span style={{ fontSize:"22px" }}>✅</span>}
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginTop:"10px" }}>
            {[["📍",h.distance,"#6366F1"],["⏱",h.wait,"#059669"],["🛏",`${h.beds} beds`,"#374151"],["🏛",h.type,tc],...(h.emergency?[["🚨","Emergency","#EF4444"]]:[])]
              .map(([ic,lb,co],i)=><span key={i} style={{ display:"inline-flex", alignItems:"center", gap:"3px", padding:"3px 9px", borderRadius:"20px", fontSize:"11px", fontWeight:"600", background:`${co}15`, color:co }}>{ic} {lb}</span>)}
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"4px", marginTop:"8px" }}>
            {h.specialty.slice(0,5).map(s=><span key={s} style={{ padding:"2px 8px", borderRadius:"20px", fontSize:"10px", background:"#F3F4F6", color:"#4B5563", fontWeight:"600" }}>{s}</span>)}
          </div>
          <div style={{ marginTop:"8px", fontSize:"11px", color:"#9CA3AF" }}>📞 {h.phone}</div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [qIdx, setQIdx]     = useState(0);
      const [answers, setAnswers] = useState({});
      const [messages, setMessages] = useState([]);
      const [inputVal, setInputVal] = useState("");
      const [multiSel, setMultiSel] = useState([]);
      const [typing, setTyping]   = useState(false);
      const [phase, setPhase]     = useState("q");
      const [hospitals, setHospitals] = useState([]);
      const [selHosp, setSelHosp] = useState(null);
      const [selDate, setSelDate] = useState(null);
      const [selSlot, setSelSlot] = useState(null);
      const [specialty, setSpecialty] = useState("");
      const [triage, setTriage]   = useState("");
      const [booking, setBooking] = useState(null);
      const bottomRef = useRef(null);

      const today = new Date();
      const dates = Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(today.getDate()+i+1); return { label:d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"}), val:d.toISOString().split("T")[0] }; });

      useEffect(()=>{ bottomRef.current && bottomRef.current.scrollIntoView({behavior:"smooth"}); },[messages,typing]);

      const startChat = () => {
        setScreen("chat"); setMessages([]); setQIdx(0); setAnswers({});
        setPhase("q"); setSelHosp(null); setSelDate(null); setSelSlot(null); setMultiSel([]);
        setTimeout(()=>pushQ(0,{}),300);
      };

      const pushQ = (idx, ans) => {
        let q = QUESTIONS[idx];
        if (!q) { finish(ans); return; }
        if (q.skipIf && q.skipIf(ans)) { nextQ(idx+1, ans, null); return; }
        const text = typeof q.bot==="function" ? q.bot(ans) : q.bot;
        if (!text) { nextQ(idx+1, ans, null); return; }
        setTyping(true);
        setTimeout(()=>{ setTyping(false); setMessages(p=>[...p,{role:"bot",type:"question",text,q}]); }, 950);
      };

      const nextQ = (nextIdx, ans, userText) => {
        if (userText) setMessages(p=>[...p,{role:"user",text:userText}]);
        setQIdx(nextIdx); setMultiSel([]); setInputVal("");
        setTimeout(()=>pushQ(nextIdx,ans), 400);
      };

      const submitText = (q) => {
        if (!inputVal.trim()) return;
        const na = {...answers,[q.key]:inputVal.trim()};
        setAnswers(na); nextQ(qIdx+1,na,inputVal.trim());
      };

      const submitSelect = (q,val) => {
        const na = {...answers,[q.key]:val};
        setAnswers(na); nextQ(qIdx+1,na,val);
      };

      const submitDual = () => {
        const age = answers._age||""; const gender = answers._gender||"";
        if (!age||!gender) return;
        const na = {...answers, age, gender};
        delete na._age; delete na._gender;
        setAnswers(na); nextQ(qIdx+1,na,`${age} years, ${gender}`);
      };

      const submitMulti = (q) => {
        if (!multiSel.length) return;
        const val = multiSel.join(", ");
        const na = {...answers,[q.key]:val};
        setAnswers(na); nextQ(qIdx+1,na,val);
      };

      const finish = (ans) => {
        const sp = detectSpecialty(ans);
        const tr = getTriageLevel(ans);
        setSpecialty(sp); setTriage(tr);
        let list = HOSPITALS.filter(h=>h.specialty.includes(sp));
        if (!list.length) list = [...HOSPITALS];
        const pref = ans.preference||"";
        if (pref.includes("Nearest")) list.sort((a,b)=>parseFloat(a.distance)-parseFloat(b.distance));
        else if (pref.includes("Highest")) list.sort((a,b)=>b.rating-a.rating);
        else if (pref.includes("Government")) { const g=list.filter(h=>h.type!=="Private"); if(g.length) list=g; }
        else list.sort((a,b)=>parseFloat(a.distance)-parseFloat(b.distance));
        const top = list.slice(0,5);
        setHospitals(top); setPhase("hospitals");
        setTyping(true);
        setTimeout(()=>{ setTyping(false); setMessages(p=>[...p,{role:"bot",type:"analysis",sp,tr,name:ans.name},{role:"bot",type:"hosplist",hospitals:top}]); },1300);
      };

      const pickHosp = (h) => {
        if (selHosp && selHosp.id===h.id) return;
        setSelHosp(h); setSelDate(null); setSelSlot(null); setPhase("slots");
        setTyping(true);
        setTimeout(()=>{ setTyping(false); setMessages(p=>[...p,{role:"user",text:`I'd like to book at ${h.name}`},{role:"bot",type:"slots",hospital:h}]); },500);
      };

      const confirm = () => {
        if (!selHosp||!selDate||!selSlot) return;
        const ref = "MCC"+Math.random().toString(36).substr(2,7).toUpperCase();
        setBooking({hospital:selHosp,date:selDate,slot:selSlot,ref,specialty,triage,name:answers.name,age:answers.age});
        setScreen("success");
      };

      const currentQ = phase==="q" ? QUESTIONS[qIdx] : null;

      const renderInputArea = () => {
        if (phase==="hospitals") return (
          <div style={{ padding:"12px 16px 20px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB", textAlign:"center", fontSize:"13px", color:"#9CA3AF" }}>
            👆 Select a hospital above to continue
          </div>
        );
        if (phase==="slots") return (
          <div style={{ padding:"12px 16px 20px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB" }}>
            {selDate&&selSlot
              ? <button onClick={confirm} style={{ width:"100%", padding:"15px", borderRadius:"14px", border:"none", background:"linear-gradient(135deg,#10B981,#059669)", color:"#fff", fontWeight:"800", fontSize:"15px", cursor:"pointer", boxShadow:"0 6px 18px rgba(16,185,129,0.35)" }}>✅ Confirm Appointment</button>
              : <div style={{ textAlign:"center", fontSize:"13px", color:"#9CA3AF" }}>👆 Pick a date and time slot above</div>
            }
          </div>
        );
        if (!currentQ) return null;
        const q = currentQ;

        if (q.type==="text") return (
          <div style={{ padding:"12px 16px 20px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB", display:"flex", gap:"10px" }}>
            <input value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitText(q)} placeholder={q.placeholder||"Type here..."} style={{ flex:1, padding:"13px 16px", borderRadius:"14px", border:"1.5px solid #E5E7EB", fontSize:"14px", outline:"none", color:"#111827", background:"#fff" }}/>
            <button onClick={()=>submitText(q)} style={{ width:"48px", height:"48px", borderRadius:"14px", border:"none", background:"linear-gradient(135deg,#4F46E5,#7C3AED)", color:"#fff", fontSize:"20px", cursor:"pointer", boxShadow:"0 4px 12px rgba(79,70,229,0.35)", flexShrink:0 }}>↑</button>
          </div>
        );

        if (q.type==="dual") return (
          <div style={{ padding:"12px 16px 20px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB" }}>
            <div style={{ display:"flex", gap:"10px", marginBottom:"10px" }}>
              <input type="number" placeholder="Age" value={answers._age||""} min={1} max={120} onChange={e=>setAnswers(p=>({...p,_age:e.target.value}))} style={{ flex:1, padding:"12px 14px", borderRadius:"12px", border:"1.5px solid #E5E7EB", fontSize:"14px", outline:"none" }}/>
              <select value={answers._gender||""} onChange={e=>setAnswers(p=>({...p,_gender:e.target.value}))} style={{ flex:1, padding:"12px 14px", borderRadius:"12px", border:"1.5px solid #E5E7EB", fontSize:"14px", outline:"none", background:"#fff", color:answers._gender?"#111827":"#9CA3AF" }}>
                <option value="" disabled>Gender</option>
                {["Male","Female","Other","Prefer not to say"].map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <button onClick={submitDual} disabled={!answers._age||!answers._gender} style={{ width:"100%", padding:"13px", borderRadius:"12px", border:"none", background:answers._age&&answers._gender?"linear-gradient(135deg,#4F46E5,#7C3AED)":"#E5E7EB", color:answers._age&&answers._gender?"#fff":"#9CA3AF", fontWeight:"700", fontSize:"14px", cursor:"pointer" }}>Continue →</button>
          </div>
        );

        if (q.type==="select"||q.type==="scale") return (
          <div style={{ padding:"10px 14px 18px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB" }}>
            <div style={{ display:"flex", flexDirection:"column", gap:"7px" }}>
              {q.options.map((opt,i)=>{
                const sc=["#22C55E","#84CC16","#EAB308","#EF4444"];
                const bg = q.type==="scale"?`${sc[Math.min(i,3)]}15`:"#F9FAFB";
                const bd = q.type==="scale"?sc[Math.min(i,3)]:"#E5E7EB";
                const co = q.type==="scale"?sc[Math.min(i,3)]:"#374151";
                return <button key={opt} onClick={()=>submitSelect(q,opt)} style={{ padding:"11px 16px", borderRadius:"12px", border:`1.5px solid ${bd}`, background:bg, color:co, fontWeight:"600", fontSize:"13px", cursor:"pointer", textAlign:"left" }}>
                  {q.type==="scale"?["🟢","🟡","🟠","🔴"][Math.min(i,3)]+" ":""}{opt}
                </button>;
              })}
            </div>
          </div>
        );

        if (q.type==="multiselect") return (
          <div style={{ padding:"10px 14px 18px", background:"rgba(255,255,255,0.96)", borderTop:"1px solid #E5E7EB" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"7px", marginBottom:"10px" }}>
              {q.options.map(opt=>{
                const sel=multiSel.includes(opt);
                return <button key={opt} onClick={()=>setMultiSel(p=>sel?p.filter(x=>x!==opt):[...p,opt])} style={{ padding:"10px", borderRadius:"12px", fontSize:"12px", fontWeight:"600", border:`1.5px solid ${sel?"#4F46E5":"#E5E7EB"}`, background:sel?"#EEF2FF":"#F9FAFB", color:sel?"#4F46E5":"#374151", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"center", gap:"6px" }}>
                  <span style={{ width:"16px", height:"16px", borderRadius:"4px", border:`2px solid ${sel?"#4F46E5":"#D1D5DB"}`, background:sel?"#4F46E5":"transparent", display:"inline-flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:"#fff", fontSize:"10px" }}>{sel?"✓":""}</span>
                  {opt}
                </button>;
              })}
            </div>
            <button onClick={()=>submitMulti(q)} disabled={!multiSel.length} style={{ width:"100%", padding:"13px", borderRadius:"12px", border:"none", background:multiSel.length?"linear-gradient(135deg,#4F46E5,#7C3AED)":"#E5E7EB", color:multiSel.length?"#fff":"#9CA3AF", fontWeight:"700", fontSize:"14px", cursor:multiSel.length?"pointer":"not-allowed" }}>
              Continue {multiSel.length?`(${multiSel.length} selected)`:""} →
            </button>
          </div>
        );
        return null;
      };

      if (screen==="home") return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#EEF2FF 0%,#F0FDF4 60%,#FFF7ED 100%)", fontFamily:"'Nunito','Segoe UI',sans-serif" }}>
          <div style={{ maxWidth:"420px", margin:"0 auto", padding:"32px 20px" }}>
            <div style={{ textAlign:"center", paddingTop:"28px", paddingBottom:"24px" }}>
              <div style={{ width:"78px", height:"78px", borderRadius:"24px", margin:"0 auto 16px", background:"linear-gradient(135deg,#4F46E5,#10B981)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"38px", boxShadow:"0 14px 36px rgba(79,70,229,0.4)" }}>🩺</div>
              <h1 style={{ fontSize:"32px", fontWeight:"900", letterSpacing:"-1.5px", color:"#111827", margin:"0 0 4px" }}>Medi<span style={{ color:"#4F46E5" }}>Connect</span></h1>
              <p style={{ color:"#6B7280", fontSize:"14px", margin:"0 0 2px" }}>AI-Powered Hospital Booking</p>
              <p style={{ color:"#4F46E5", fontSize:"12px", fontWeight:"800", letterSpacing:"0.5px" }}>📍 BANGALORE, KARNATAKA</p>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"10px", marginBottom:"22px" }}>
              {[["10+","Hospitals"],["4.6★","Avg Rating"],["~20min","Avg Wait"]].map(([v,l])=>(
                <div key={l} style={{ background:"#fff", borderRadius:"14px", padding:"14px 10px", textAlign:"center", boxShadow:"0 2px 10px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontWeight:"900", fontSize:"17px", color:"#4F46E5" }}>{v}</div>
                  <div style={{ fontSize:"10px", color:"#9CA3AF", marginTop:"2px", fontWeight:"700" }}>{l}</div>
                </div>
              ))}
            </div>
            <button onClick={startChat} style={{ width:"100%", padding:"19px", borderRadius:"18px", border:"none", background:"linear-gradient(135deg,#4F46E5,#7C3AED)", color:"#fff", fontWeight:"900", fontSize:"17px", cursor:"pointer", boxShadow:"0 10px 28px rgba(79,70,229,0.4)", display:"flex", alignItems:"center", justifyContent:"center", gap:"10px", marginBottom:"18px" }}>
              <span style={{ fontSize:"22px" }}>💬</span> Chat with MediBot
            </button>
            <div style={{ fontSize:"11px", fontWeight:"800", color:"#9CA3AF", letterSpacing:"1.5px", marginBottom:"10px" }}>FEATURED HOSPITALS</div>
            {HOSPITALS.slice(0,3).map(h=>(
              <div key={h.id} style={{ background:"#fff", borderRadius:"14px", padding:"14px", boxShadow:"0 2px 10px rgba(0,0,0,0.05)", marginBottom:"8px", display:"flex", alignItems:"center", gap:"12px" }}>
                <div style={{ width:"44px", height:"44px", borderRadius:"12px", background:"#EEF2FF", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"22px", flexShrink:0 }}>🏥</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:"800", fontSize:"13px", color:"#111827" }}>{h.name}</div>
                  <div style={{ fontSize:"11px", color:"#6B7280" }}>📍 {h.area}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontWeight:"800", fontSize:"13px", color:"#F59E0B" }}>★ {h.rating}</div>
                  <div style={{ fontSize:"11px", color:"#10B981", fontWeight:"700" }}>{h.wait}</div>
                </div>
              </div>
            ))}
            <div style={{ marginTop:"16px", background:"#FFF7ED", borderRadius:"14px", padding:"14px 16px", border:"1px solid #FED7AA" }}>
              <div style={{ fontWeight:"800", fontSize:"13px", color:"#92400E" }}>⚠️ Emergency?</div>
              <div style={{ fontSize:"12px", color:"#B45309", marginTop:"4px" }}>Call <strong>108</strong> (Ambulance) or <strong>112</strong> immediately. Don't wait for an appointment.</div>
            </div>
          </div>
        </div>
      );

      if (screen==="success"&&booking) return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#F0FDF4,#EEF2FF)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", alignItems:"center" }}>
          <div style={{ maxWidth:"420px", margin:"0 auto", padding:"32px 20px", width:"100%" }}>
            <div style={{ textAlign:"center", marginBottom:"24px" }}>
              <div style={{ fontSize:"68px", marginBottom:"10px" }}>🎉</div>
              <h2 style={{ fontSize:"28px", fontWeight:"900", letterSpacing:"-1px", margin:"0 0 4px" }}>Appointment Confirmed!</h2>
              <p style={{ color:"#6B7280", margin:0, fontSize:"14px" }}>See you soon, {booking.name}!</p>
            </div>
            <div style={{ background:"#fff", borderRadius:"20px", padding:"22px", boxShadow:"0 4px 24px rgba(0,0,0,0.08)", marginBottom:"14px" }}>
              <div style={{ padding:"10px 14px", borderRadius:"12px", background:TB[booking.triage], border:`1px solid ${TC[booking.triage]}33`, marginBottom:"14px", display:"flex", gap:"10px", alignItems:"center" }}>
                <span style={{ fontSize:"20px" }}>{TI[booking.triage]}</span>
                <div>
                  <div style={{ fontSize:"11px", fontWeight:"800", color:TC[booking.triage], letterSpacing:"1px" }}>{booking.triage} PRIORITY</div>
                  <div style={{ fontSize:"12px", color:"#6B7280" }}>Referred to: <strong>{booking.specialty}</strong></div>
                </div>
              </div>
              <div style={{ fontWeight:"800", fontSize:"16px", color:"#111827", marginBottom:"2px" }}>{booking.hospital.name}</div>
              <div style={{ fontSize:"12px", color:"#6B7280", marginBottom:"12px" }}>📍 {booking.hospital.area}, Bangalore · 📞 {booking.hospital.phone}</div>
              {[["📅 Date",booking.date],["⏰ Time",booking.slot],["📍 Distance",booking.hospital.distance],["⭐ Rating",`${booking.hospital.rating} (${booking.hospital.reviews.toLocaleString()} reviews)`],["👤 Patient",`${booking.name}, Age ${booking.age}`]].map(([l,v])=>(
                <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #F3F4F6" }}>
                  <span style={{ fontSize:"13px", color:"#9CA3AF" }}>{l}</span>
                  <span style={{ fontSize:"13px", fontWeight:"700", color:"#111827" }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:"14px", background:"#EEF2FF", borderRadius:"12px", padding:"14px", textAlign:"center" }}>
                <div style={{ fontSize:"11px", fontWeight:"800", color:"#4F46E5", letterSpacing:"1.5px" }}>BOOKING REFERENCE</div>
                <div style={{ fontSize:"26px", fontWeight:"900", color:"#4338CA", letterSpacing:"3px", marginTop:"4px" }}>{booking.ref}</div>
              </div>
            </div>
            <button onClick={startChat} style={{ width:"100%", padding:"15px", borderRadius:"14px", border:"none", background:"linear-gradient(135deg,#4F46E5,#7C3AED)", color:"#fff", fontWeight:"800", fontSize:"15px", cursor:"pointer", marginBottom:"8px", boxShadow:"0 8px 22px rgba(79,70,229,0.35)" }}>Book Another Appointment</button>
            <button onClick={()=>setScreen("home")} style={{ width:"100%", padding:"13px", borderRadius:"14px", border:"1.5px solid #E5E7EB", background:"#fff", color:"#6B7280", fontWeight:"700", fontSize:"14px", cursor:"pointer" }}>← Back to Home</button>
          </div>
        </div>
      );

      return (
        <div style={{ maxWidth:"420px", margin:"0 auto", display:"flex", flexDirection:"column", height:"100vh", background:"#F3F4F6", fontFamily:"'Nunito','Segoe UI',sans-serif", position:"relative" }}>
          <div style={{ padding:"13px 18px", background:"#fff", borderBottom:"1px solid #E5E7EB", display:"flex", alignItems:"center", gap:"12px", boxShadow:"0 2px 8px rgba(0,0,0,0.05)", flexShrink:0 }}>
            <button onClick={()=>setScreen("home")} style={{ background:"none", border:"none", cursor:"pointer", color:"#4F46E5", fontSize:"22px", padding:0 }}>←</button>
            <div style={{ width:"38px", height:"38px", borderRadius:"12px", background:"linear-gradient(135deg,#4F46E5,#10B981)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"20px" }}>🤖</div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:"800", fontSize:"15px", color:"#111827" }}>MediBot</div>
              <div style={{ fontSize:"11px", color:"#10B981", fontWeight:"700" }}>● Bangalore Health Assistant</div>
            </div>
            {phase==="q" && <div style={{ fontSize:"11px", fontWeight:"700", color:"#9CA3AF", flexShrink:0 }}>{Math.min(qIdx+1,QUESTIONS.length)}/{QUESTIONS.length}</div>}
          </div>
          {phase==="q" && (
            <div style={{ height:"3px", background:"#E5E7EB", flexShrink:0 }}>
              <div style={{ height:"100%", background:"linear-gradient(90deg,#4F46E5,#10B981)", width:`${(qIdx/QUESTIONS.length)*100}%`, transition:"width 0.4s" }}/>
            </div>
          )}
          <div style={{ flex:1, overflowY:"auto", padding:"16px 14px", display:"flex", flexDirection:"column", gap:"10px" }}>
            {messages.map((msg,i)=>(
              <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:msg.role==="user"?"flex-end":"flex-start" }}>
                {msg.role==="bot" && (
                  <BotRow>
                    {(msg.type==="question"||msg.type==="text") && <Bubble><div dangerouslySetInnerHTML={{__html:fmt(msg.text)}}/></Bubble>}
                    {msg.type==="analysis" && (
                      <div style={{ borderRadius:"4px 18px 18px 18px", background:"#fff", padding:"16px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", maxWidth:"94%" }}>
                        <div style={{ fontWeight:"800", fontSize:"15px", color:"#111827", marginBottom:"3px" }}>Thanks {msg.name}! 🧬 Here's my assessment:</div>
                        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", marginTop:"10px" }}>
                          <span style={{ padding:"5px 12px", borderRadius:"20px", fontSize:"12px", fontWeight:"700", background:`${TC[msg.tr]}15`, color:TC[msg.tr], border:`1px solid ${TC[msg.tr]}44` }}>{TI[msg.tr]} {msg.tr} PRIORITY</span>
                          <span style={{ padding:"5px 12px", borderRadius:"20px", fontSize:"12px", fontWeight:"700", background:"#EEF2FF", color:"#4F46E5" }}>🩺 {msg.sp}</span>
                        </div>
                        {msg.tr==="EMERGENCY" && <div style={{ marginTop:"10px", padding:"10px 12px", borderRadius:"10px", background:"#FEF2F2", border:"1px solid #FECACA", fontSize:"13px", color:"#DC2626", fontWeight:"700" }}>🚨 Call 108 or go to the nearest emergency room now!</div>}
                      </div>
                    )}
                    {msg.type==="hosplist" && (
                      <div style={{ width:"100%" }}>
                        <Bubble><div>Here are the <strong>top Bangalore hospitals</strong> for your condition. Tap one to book! 👇</div></Bubble>
                        <div style={{ marginTop:"10px" }}>{msg.hospitals.map(h=><HospCard key={h.id} h={h} onSelect={pickHosp} selected={selHosp&&selHosp.id===h.id}/>)}</div>
                      </div>
                    )}
                    {msg.type==="slots" && (
                      <div style={{ width:"100%" }}>
                        <Bubble><div>Let's book at <strong>{msg.hospital.name}</strong>! Select a date and time slot below:</div></Bubble>
                        <div style={{ marginTop:"10px" }}>
                          <div style={{ background:"#fff", borderRadius:"14px", padding:"14px", boxShadow:"0 2px 10px rgba(0,0,0,0.05)", marginBottom:"8px" }}>
                            <div style={{ fontSize:"11px", fontWeight:"800", color:"#9CA3AF", letterSpacing:"1px", marginBottom:"10px" }}>SELECT DATE</div>
                            <div style={{ display:"flex", gap:"8px", overflowX:"auto", paddingBottom:"4px" }}>
                              {dates.map(d=><button key={d.val} onClick={()=>{setSelDate(d.label);setSelSlot(null);}} style={{ flexShrink:0, padding:"8px 14px", borderRadius:"10px", border:`1.5px solid ${selDate===d.label?"#4F46E5":"#E5E7EB"}`, background:selDate===d.label?"#EEF2FF":"#fff", color:selDate===d.label?"#4F46E5":"#6B7280", fontWeight:"700", fontSize:"11px", cursor:"pointer", whiteSpace:"nowrap" }}>{d.label}</button>)}
                            </div>
                          </div>
                          {selDate && (
                            <div style={{ background:"#fff", borderRadius:"14px", padding:"14px", boxShadow:"0 2px 10px rgba(0,0,0,0.05)" }}>
                              <div style={{ fontSize:"11px", fontWeight:"800", color:"#9CA3AF", letterSpacing:"1px", marginBottom:"10px" }}>AVAILABLE SLOTS</div>
                              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"8px" }}>
                                {TIMESLOTS.map(t=><button key={t} onClick={()=>setSelSlot(t)} style={{ padding:"10px 6px", borderRadius:"10px", border:`1.5px solid ${selSlot===t?"#10B981":"#E5E7EB"}`, background:selSlot===t?"#F0FDF4":"#fff", color:selSlot===t?"#059669":"#374151", fontWeight:"700", fontSize:"12px", cursor:"pointer" }}>{t}</button>)}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </BotRow>
                )}
                {msg.role==="user" && <Bubble isUser>{msg.text}</Bubble>}
              </div>
            ))}
            {typing && <BotRow><Dots/></BotRow>}
            <div ref={bottomRef}/>
          </div>
          {renderInputArea()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
